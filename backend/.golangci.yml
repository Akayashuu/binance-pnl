run:
  timeout: 5m
  go: "1.23"
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - whitespace
    - bodyclose
    - errorlint
    - copyloopvar
    - gocritic
    - gosec
    - prealloc

linters-settings:
  revive:
    rules:
      - name: exported
        arguments: ["disableStutteringCheck"]
  gosec:
    excludes:
      - G104  # audited, errors are intentionally ignored in writeJSON helpers
  gocritic:
    disabled-checks:
      - ifElseChain

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - revive
  max-issues-per-linter: 0
  max-same-issues: 0
